
<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndexRapidly - URL Indexing Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <h1 class="text-6xl font-bold text-gray-900 mb-4">
                Index<span class="text-blue-600">Rapidly</span>
            </h1>
            <p class="text-xl text-gray-600 mb-8">Premium URL Indexing Service</p>
            <div class="space-x-4">
                <a href="/dashboard.html" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
                    Go to Dashboard
                </a>
                <a href="/api/health" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
                    Check API
                </a>
            </div>
            <div class="mt-8 text-sm text-gray-500">
                Server Status: <span id="status">Checking...</span>
            </div>
        </div>
    </div>
    
    <script>
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('status').innerHTML = 
                    '✅ Online - ' + data.status;
            })
            .catch(() => {
                document.getElementById('status').innerHTML = '❌ Error';
            });
    </script>
</body>
</html>
