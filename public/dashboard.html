<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IndexRapidly Dashboard - Manage URL indexing, credits, and submissions">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard - IndexRapidly</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <i class="fas fa-bolt text-blue-600 text-2xl mr-2"></i>
                        <span class="text-xl font-bold">Index<span class="text-blue-600">Rapidly</span></span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="credits-display" class="hidden md:flex items-center bg-blue-50 px-3 py-1 rounded-full">
                        <i class="fas fa-coins text-blue-600 mr-2"></i>
                        <span id="credits-count" class="font-semibold text-blue-600">0</span>
                        <span class="text-sm text-blue-600 ml-1">credits</span>
                    </div>
                    <span id="user-display" class="text-sm text-gray-700"></span>
                    <button id="logout-btn" class="text-red-600 hover:text-red-700 text-sm font-medium">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Auth Section -->
            <div id="auth-section" class="max-w-md mx-auto">
                <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                    <div class="flex border-b">
                        <button class="auth-tab active flex-1 py-3 text-center font-semibold" data-tab="login">Login</button>
                        <button class="auth-tab flex-1 py-3 text-center font-semibold" data-tab="register">Register</button>
                    </div>
                    
                    <!-- Login Form -->
                    <div id="login-form" class="p-6 auth-form">
                        <h2 class="text-2xl font-bold text-gray-900 mb-6">Welcome Back</h2>
                        <form id="login-form-element" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="login-email" required class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="login-password" required class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                                Login
                            </button>
                        </form>
                    </div>
                    
                    <!-- Register Form -->
                    <div id="register-form" class="p-6 auth-form hidden">
                        <h2 class="text-2xl font-bold text-gray-900 mb-6">Create Account</h2>
                        <form id="register-form-element" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                <input type="text" id="reg-username" required minlength="3" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="reg-email" required class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="reg-password" required minlength="8" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                            </div>
                            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700">
                                Register
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            
            <!-- Dashboard Content (Hidden until login) -->
            <div id="dashboard-content" class="hidden">
                
                <!-- URL Submission -->
                <section class="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-4">Submit URLs for Indexing</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Enter URLs (one per line)
                        </label>
                        <textarea id="url-input" rows="10" 
                            placeholder="https://example.com/page1&#10;https://example.com/page2&#10;https://example.com/page3"
                            class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 font-mono"></textarea>
                        <div class="mt-2 flex justify-between text-sm">
                            <span id="url-count" class="text-gray-500">0 URLs entered</span>
                            <button id="clear-urls" class="text-red-600 hover:text-red-700">Clear All</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Indexing Schedule</label>
                            <select id="schedule-type" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                                <option value="instant">Instant Indexing</option>
                                <option value="scheduled">Schedule for Later</option>
                            </select>
                        </div>
                        <div id="schedule-time-container" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Schedule Date & Time</label>
                            <input type="datetime-local" id="schedule-time" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <div class="text-sm">
                            <span class="text-gray-600">Credits needed: </span>
                            <span id="credits-needed" class="font-semibold text-blue-600">0</span>
                        </div>
                        <button id="submit-urls-btn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 disabled:opacity-50" disabled>
                            <i class="fas fa-paper-plane mr-2"></i> Submit URLs
                        </button>
                    </div>
                    
                    <div id="submission-status" class="mt-4 hidden"></div>
                </section>
                
                <!-- Quick Stats -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-white rounded-lg shadow p-4">
                        <p class="text-sm text-gray-600">Credits Balance</p>
                        <p id="stats-credits" class="text-2xl font-bold text-blue-600">0</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <p class="text-sm text-gray-600">URLs Submitted</p>
                        <p id="stats-total" class="text-2xl font-bold text-green-600">0</p>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4">
                        <p class="text-sm text-gray-600">Successful</p>
                        <p id="stats-success" class="text-2xl font-bold text-purple-600">0</p>
                    </div>
                </div>
                
                <!-- Submission History -->
                <section class="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold text-gray-900">Submission History</h2>
                        <button id="refresh-history" class="text-blue-600 hover:text-blue-700">
                            <i class="fas fa-sync-alt mr-1"></i> Refresh
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">URL</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body" class="divide-y divide-gray-200">
                                <tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="pagination" class="mt-4 flex justify-between items-center">
                        <button id="prev-page" class="px-4 py-2 border rounded-md hover:bg-gray-50 disabled:opacity-50">Previous</button>
                        <span id="page-info" class="text-sm text-gray-600"></span>
                        <button id="next-page" class="px-4 py-2 border rounded-md hover:bg-gray-50 disabled:opacity-50">Next</button>
                    </div>
                </section>
                
                <!-- Buy Credits -->
                <section class="bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-2xl font-bold text-gray-900 mb-4">Purchase Credits</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="package-cards">
                        <div class="text-center text-gray-500">Loading packages...</div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Payment Modal -->
    <div id="payment-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">Complete Payment</h3>
                <button id="close-payment-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="mb-4">
                <p class="text-sm text-gray-600">Package: <span id="modal-package-name" class="font-semibold"></span></p>
                <p class="text-sm text-gray-600">Credits: <span id="modal-package-credits" class="font-semibold"></span></p>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Cryptocurrency</label>
                <select id="crypto-type" class="w-full px-3 py-2 border rounded-md">
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="USDT">Tether (USDT)</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Send Payment To</label>
                <div class="bg-gray-50 p-3 rounded-md">
                    <code id="payment-address" class="text-xs break-all"></code>
                    <button id="copy-address" class="mt-2 text-blue-600 hover:text-blue-700 text-sm">
                        <i class="fas fa-copy mr-1"></i> Copy
                    </button>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
                <p id="payment-amount" class="text-2xl font-bold text-blue-600"></p>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Transaction Hash</label>
                <input type="text" id="transaction-hash" placeholder="0x..." class="w-full px-3 py-2 border rounded-md">
            </div>
            
            <button id="confirm-payment-btn" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                Confirm Payment
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 hidden bg-white rounded-lg shadow-lg p-4 max-w-sm z-50">
        <div class="flex items-center">
            <i id="toast-icon" class="text-xl mr-2"></i>
            <p id="toast-message" class="text-sm text-gray-800"></p>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
